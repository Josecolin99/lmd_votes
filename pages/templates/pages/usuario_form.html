{% extends 'pages/base.html' %}
{% block title %}Nuevo Usuario — LMD Votes{% endblock %}

{% block content %}
<div class="form-page">
    <h2 class="page-title">NUEVO USUARIO</h2>

    <form class="glam-form" id="usuario-form">
        <div class="form-group">
            <label for="u-username">Nombre de usuario</label>
            <input type="text" id="u-username" placeholder="nombre_usuario" required>
        </div>
        <div class="form-group">
            <label for="u-password">Contraseña</label>
            <input type="password" id="u-password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
            <label for="u-password2">Confirmar contraseña</label>
            <input type="password" id="u-password2" placeholder="••••••••" required>
        </div>
        <div class="form-group form-group--inline">
            <input type="checkbox" id="u-is-staff">
            <label for="u-is-staff" style="text-transform:none;letter-spacing:0;font-size:1rem">
                Es administrador
            </label>
        </div>
        <div class="form-error" id="form-error"></div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Crear Usuario 👑</button>
            <a href="{% url 'usuarios' %}" class="btn btn-ghost">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    initUsuarioForm();
</script>
{% endblock %}
