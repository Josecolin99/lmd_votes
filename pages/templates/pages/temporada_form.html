{% extends 'pages/base.html' %}
{% block title %}Nueva Temporada — LMD Votes{% endblock %}

{% block content %}
<div class="form-page">
    <h2 class="page-title">NUEVA TEMPORADA</h2>

    <form class="glam-form" id="temporada-form">
        <div class="form-group">
            <label for="temporada-number">Número de temporada</label>
            <input type="number" id="temporada-number" min="1" placeholder="1" required>
        </div>
        <div class="form-group">
            <label for="temporada-name">Nombre <span class="optional">(opcional)</span></label>
            <input type="text" id="temporada-name" placeholder="Ej: La Más Draga 1">
        </div>
        <div class="form-group">
            <label for="temporada-image">URL de imagen <span class="optional">(opcional)</span></label>
            <input type="url" id="temporada-image" placeholder="https://...">
        </div>
        <div class="image-preview" id="image-preview"></div>
        <div class="form-error" id="form-error"></div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar Temporada 🎭</button>
            <a href="{% url 'temporadas' %}" class="btn btn-ghost">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    initTemporadaForm();
</script>
{% endblock %}
