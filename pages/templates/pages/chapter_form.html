{% extends 'pages/base.html' %}
{% block title %}Nuevo Capítulo — LMD Votes{% endblock %}

{% block content %}
<div class="form-page">
    <h2 class="page-title">NUEVO CAPÍTULO</h2>

    <form class="glam-form" id="chapter-form">
        <div class="form-group">
            <label for="chapter-number">Número de capítulo</label>
            <input type="number" id="chapter-number" min="1" placeholder="1" required>
        </div>
        <div class="form-group">
            <label for="chapter-name">Nombre del episodio <span class="optional">(opcional)</span></label>
            <input type="text" id="chapter-name" placeholder="Ej: La Gran Final">
        </div>
        <div class="form-error" id="form-error"></div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar Capítulo 🎬</button>
            <a href="{% url 'temporada_detail' temporada_id %}" class="btn btn-ghost">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    initChapterForm({{ temporada_id }});
</script>
{% endblock %}
