<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LMD Votes{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'pages/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="brand">👑 LMD VOTES</a>
        <div class="nav-links">
            <a href="{% url 'dragas' %}">Dragas</a>
            <a href="{% url 'chapters' %}">Capítulos</a>
            {% if request.user.is_staff %}
                <a href="{% url 'usuarios' %}" class="nav-admin">Usuarios</a>
            {% endif %}
        </div>
        <div class="nav-user">
            <span class="nav-username">
                {% if request.user.is_staff %}👑{% endif %}
                {{ request.user.username }}
            </span>
            <form method="post" action="{% url 'logout' %}" style="display:inline">
                {% csrf_token %}
                <button type="submit" class="btn-logout">Salir</button>
            </form>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        const API_BASE = '/api';
        const CSRF_TOKEN = '{{ csrf_token }}';
    </script>
    {% load static %}
    <script src="{% static 'pages/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
