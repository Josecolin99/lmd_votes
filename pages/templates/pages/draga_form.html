{% extends 'pages/base.html' %}
{% block title %}Nueva Draga — LMD Votes{% endblock %}

{% block content %}
<div class="form-page">
    <h2 class="page-title">NUEVA DRAGA</h2>

    <form class="glam-form" id="draga-form">
        <div class="form-group">
            <label for="draga-name">Nombre artístico</label>
            <input type="text" id="draga-name" placeholder="Ej: Valentina" required>
        </div>
        <div class="form-group">
            <label for="draga-image">URL de imagen</label>
            <input type="url" id="draga-image" placeholder="https://..." required>
        </div>
        <div class="image-preview" id="image-preview"></div>
        <div class="form-error" id="form-error"></div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar Draga ✨</button>
            <a href="{% url 'dragas' %}" class="btn btn-ghost">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    initDragaForm();
</script>
{% endblock %}
