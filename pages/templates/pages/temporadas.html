{% extends 'pages/base.html' %}
{% block title %}Temporadas — LMD Votes{% endblock %}

{% block content %}
<div class="page-header">
    <h2 class="page-title">🎭 TEMPORADAS</h2>
    {% if request.user.is_staff %}
        <a href="{% url 'temporada_form' %}" class="btn btn-primary">+ Nueva Temporada</a>
    {% endif %}
</div>

<div class="temporadas-grid" id="temporada-grid">
    <div class="loading">Cargando temporadas...</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    loadTemporadas();
</script>
{% endblock %}
